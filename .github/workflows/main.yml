name: CI

      - name: Checkout with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Update riscv-arch-test submodule to latest
        run: |
          # ensure the riscv-arch-test submodule is updated to the latest upstream
          git submodule update --init --remote test/external/riscof/riscv-arch-test || true

      - name: Build riscv-arch-test suites
        run: |
          cd test/external/riscv-arch-test/riscv-test-suite
          make -j$(nproc) rv32i_m || true
          make -j$(nproc) rv64i_m || true

      - name: Build tests for Coreblocks (compile ELFs)
        run: |
          mkdir -p ../../test/external/riscof/riscv-arch-test_build
          find test/external/riscof/riscv-arch-test/riscv-test-suite -type f -name "*.S" -print0 | \
            xargs -0 -n1 -P$(nproc) -I{} sh -c 'out=../../test/external/riscof/riscv-arch-test_build/$(basename {} .S).elf; riscv64-unknown-elf-gcc -march=rv64imac -mabi=lp64 -static -nostdlib -nostartfiles -o "$out" "{}" || true'

      - name: Upload compiled tests artifact
        uses: actions/upload-artifact@v7
        with:
          name: "riscv-arch-test"
          path: |
            test/external/riscof/riscv-arch-test_build/**/*.elf
        run: |
          python3 -m venv venv
          . venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install .

      - name: Generate Verilog
        run: |
          . venv/bin/activate
          PYTHONHASHSEED=0 TRANSACTRON_VERBOSE=1 python3 -m coreblocks.gen_verilog --verbose --config full

      - uses: actions/upload-artifact@v7
        with:
          name: "verilog-full-core"
          path: |
            core.v
            core.v.json


  build-riscof-tests:
    name: Build regression tests (riscv-arch-test)
    runs-on: ubuntu-latest
    container: ghcr.io/kuznia-rdzeni/riscv-toolchain:2024.12.07
    timeout-minutes: 10
    env:
      LC_ALL: "C.UTF8"
      LANG: "C.UTF8"
    defaults:
      run:
        working-directory: test/external/

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Update riscv-arch-test submodule to latest
        run: |
          git config --global --add safe.directory /__w/coreblocks/coreblocks
          git submodule update --init --remote test/external/riscv-arch-test

      - name: Get submodules HEAD hash
        run: |
          git config --global --add safe.directory /__w/coreblocks/coreblocks
          git submodule > .gitmodules-hash

      - name: Cache compiled riscv-arch-test ELFs
        id: cache-riscv-arch-test
        uses: actions/cache@v4
        env:
          cache-name: cache-riscv-arch-test-elfs
        with:
          path: |
            test/external/riscv-arch-test-build/**/*.elf

          key: ${{ env.cache-name }}-${{ runner.os }}-${{ hashFiles(
              '**/.gitmodules-hash',
              '**/docker/riscv-toolchain.Dockerfile',
              '**/.github/workflows/main.yml'
            ) }}
          lookup-only: true

      - if: ${{ steps.cache-riscv-arch-test.outputs.cache-hit != 'true' }}
        name: Build riscv-arch-test suites
        run: |
          cd test/external/riscv-arch-test/riscv-test-suite
          make -j$(nproc) rv32i_m || true
          make -j$(nproc) rv64i_m || true

      - if: ${{ steps.cache-riscv-arch-test.outputs.cache-hit != 'true' }}
        name: Build test ELFs for Coreblocks
        run: |
          mkdir -p test/external/riscv-arch-test-build
          # Compile all test sources (.S files) from the test suite
          find test/external/riscv-arch-test/riscv-test-suite -type f -name "*.S" -print0 | \
            xargs -0 -n1 -P$(nproc) -I{} sh -c 'out=test/external/riscv-arch-test-build/$(basename {} .S).elf; riscv64-unknown-elf-gcc -march=rv64imac -mabi=lp64 -static -nostdlib -nostartfiles -I test/external/riscv-arch-test/riscv-test-suite/env -o "$out" "{}" 2>/dev/null || true'

      - name: Upload compiled test ELFs artifact
        uses: actions/upload-artifact@v7
        with:
          name: "riscv-arch-test-elfs"
          path: |
            test/external/riscv-arch-test-build/**/*.elf

  run-riscof-tests:
    name: Run regression tests (riscv-arch-test)
    runs-on: ubuntu-22.04  # older version for compatibility with Docker image
    container: ghcr.io/kuznia-rdzeni/verilator:v5.008-2023.11.19_v
    needs: [ build-riscof-tests, build-core ]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get submodules HEAD hash
        run: |
          git config --global --add safe.directory /__w/coreblocks/coreblocks
          git submodule > .gitmodules-hash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.13'

      - name: Install Coreblocks dependencies
        run: |
          python3 -m venv venv
          . venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install ".[dev]"

      - uses: actions/download-artifact@v8
        name: Download full verilog core
        with:
          name: "verilog-full-core"
          path: .

      - uses: actions/download-artifact@v8
        name: Download compiled test ELFs
        with:
          name: "riscv-arch-test-elfs"
          path: test/external/riscv-arch-test-build

      - name: Run riscv-arch-test on Coreblocks with cocotb
        run: |
          . venv/bin/activate
          # Run all compiled ELFs and check exit codes (self-checking binaries)
          sh ./ci/run_riscv_arch_tests_cocotb.sh test/external/riscv-arch-test-build


  build-regression-tests:
    name: Build regression tests (riscv-tests)
    runs-on: ubuntu-latest
    container: ghcr.io/kuznia-rdzeni/riscv-toolchain:2024.12.07
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get submodules HEAD hash
        run: |
          git config --global --add safe.directory /__w/coreblocks/coreblocks
          git submodule > .gitmodules-hash

      - name: Cache regression-tests
        id: cache-regression
        uses: actions/cache@v4
        env:
          cache-name: cache-regression-tests
        with:
          path: test/external/riscv-tests/test-*
          key: ${{ env.cache-name }}-${{ runner.os }}-${{ hashFiles(
              '**/test/external/riscv-tests/environment/custom/**',
              '**/test/external/riscv-tests/Makefile',
              '**/.gitmodules-hash',
              '**/docker/riscv-toolchain.Dockerfile',
              '**/.github/workflows/main.yml'
            ) }}
          lookup-only: true

      - if: ${{ steps.cache-regression.outputs.cache-hit != 'true' }}
        name: Checkout with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - if: ${{ steps.cache-regression.outputs.cache-hit != 'true' }}
        run: cd test/external/riscv-tests && make

      - if: ${{ steps.cache-regression.outputs.cache-hit != 'true' }}
        name: Upload riscv-tests
        uses: actions/upload-artifact@v7
        with:
          path: test/external/riscv-tests

  run-regression-tests:
    name: Run regression tests (riscv-tests)
    runs-on: ubuntu-22.04  # older version for compatibility with Docker image
    timeout-minutes: 20
    container: ghcr.io/kuznia-rdzeni/verilator:v5.008-2023.11.19_v
    needs: [ build-regression-tests, build-core ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get submodules HEAD hash
        run: |
          git config --global --add safe.directory /__w/coreblocks/coreblocks
          git submodule > .gitmodules-hash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python3 -m venv venv
          . venv/bin/activate
          python3 -m pip install --upgrade pip
          python3 -m pip install ".[dev]"

      - uses: actions/download-artifact@v8
        name: Download full verilog core
        with:
          name: "verilog-full-core"
          path: .

      - uses: actions/cache@v4
        name: Download tests from cache
        env:
          cache-name: cache-regression-tests
        with:
          path: test/external/riscv-tests/test-*
          key: ${{ env.cache-name }}-${{ runner.os }}-${{ hashFiles(
              '**/test/external/riscv-tests/environment/custom/**',
              '**/test/external/riscv-tests/Makefile',
              '**/.gitmodules-hash',
              '**/docker/riscv-toolchain.Dockerfile',
              '**/.github/workflows/main.yml'
            ) }}
          fail-on-cache-miss: true

      - name: Run tests
        run: |
          . venv/bin/activate
          scripts/run_tests.py -a regression

      - name: Check regression with pysim
        run: |
          . venv/bin/activate
          ./scripts/run_tests.py -c 1 -a -b pysim regression


  unit-test:
    name: Run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip3 install ".[dev]"
          sudo apt-get install -y binutils-riscv64-unknown-elf

      - name: Run tests
        run: ./scripts/run_tests.py -v

      - name: Check traces and profiles
        run: ./scripts/run_tests.py -t -p -c 1 TestCore

      - name: Check listing tests
        run: ./scripts/run_tests.py -l

  lint:
    name: Check code formatting and typing
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip3 install ".[dev]"

      - name: Check format
        run: ./scripts/lint.sh check_format

      - name: Check types
        run: ./scripts/lint.sh check_types

      - name: Check line endings
        run: |
          git add --renormalize .
          git diff --cached --exit-code

      - name: Check pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure
